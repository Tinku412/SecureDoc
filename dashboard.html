<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — SecureDoc</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <span class="brand-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7l8-4z"/></svg>
        </span>
        SecureDoc
      </a>
      <nav class="nav-links">
        <a href="app.html">Documents</a>
        <a href="dashboard.html">Analytics</a>
        <button class="btn btn-sm" id="signout-btn">Sign out</button>
      </nav>
    </div>
  </header>

  <main class="container" id="main" style="display:none">
    <div class="page-head">
      <h1>Analytics</h1>
      <p>Every open, every reader, every page — across all your shared documents.</p>
    </div>

    <div class="stat-grid" id="stat-grid">
      <div class="stat-cell"><div class="stat-value" id="stat-docs">0</div><div class="stat-label">Documents</div></div>
      <div class="stat-cell"><div class="stat-value" id="stat-views">0</div><div class="stat-label">Total opens</div></div>
      <div class="stat-cell"><div class="stat-value" id="stat-viewers">0</div><div class="stat-label">Unique readers</div></div>
      <div class="stat-cell"><div class="stat-value" id="stat-time">0s</div><div class="stat-label">Total reading time</div></div>
    </div>

    <div id="analytics-list">
      <p class="loading-note">Loading analytics…</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script>
    async function init() {
      const session = await requireOwnerSession();
      if (!session) return;
      $("#main").style.display = "block";
      await loadAnalytics();
    }

    async function loadAnalytics() {
      const [{ data: docs }, { data: sessions }] = await Promise.all([
        sb.from("documents").select("id, title, created_at").order("created_at", { ascending: false }),
        sb.from("view_sessions").select("id, document_id, viewer_email, ip_address, opened_at, total_seconds").order("opened_at", { ascending: false }),
      ]);

      const sessionIds = (sessions || []).map((s) => s.id);
      let pageViews = [];
      if (sessionIds.length) {
        const { data } = await sb
          .from("page_views")
          .select("session_id, page_number, seconds_spent")
          .in("session_id", sessionIds);
        pageViews = data || [];
      }

      renderStats(docs || [], sessions || []);
      renderDocs(docs || [], sessions || [], pageViews);
    }

    function renderStats(docs, sessions) {
      $("#stat-docs").textContent = docs.length;
      $("#stat-views").textContent = sessions.length;
      $("#stat-viewers").textContent = new Set(sessions.map((s) => s.viewer_email)).size;
      $("#stat-time").textContent = formatDuration(
        sessions.reduce((sum, s) => sum + (s.total_seconds || 0), 0)
      );
    }

    function renderDocs(docs, sessions, pageViews) {
      const container = $("#analytics-list");
      if (!docs.length) {
        container.innerHTML = `<div class="card card-flat"><p style="color:var(--ink-soft)">
          No documents yet. <a href="app.html">Upload and share one</a> to start collecting analytics.</p></div>`;
        return;
      }

      const pagesBySession = {};
      pageViews.forEach((pv) => {
        (pagesBySession[pv.session_id] ||= []).push(pv);
      });

      container.innerHTML = docs.map((doc) => {
        const docSessions = sessions.filter((s) => s.document_id === doc.id);
        return renderDocSection(doc, docSessions, pagesBySession);
      }).join("");
    }

    function renderDocSection(doc, docSessions, pagesBySession) {
      const totalTime = docSessions.reduce((sum, s) => sum + (s.total_seconds || 0), 0);
      const uniqueReaders = new Set(docSessions.map((s) => s.viewer_email)).size;

      // Aggregate page-level time across all sessions of this document.
      const pageTotals = {};
      docSessions.forEach((s) =>
        (pagesBySession[s.id] || []).forEach((pv) => {
          pageTotals[pv.page_number] = (pageTotals[pv.page_number] || 0) + pv.seconds_spent;
        })
      );

      const sessionRows = docSessions.map((s) => {
        const pages = (pagesBySession[s.id] || [])
          .sort((a, b) => a.page_number - b.page_number)
          .map((pv) => `p${pv.page_number}: ${formatDuration(pv.seconds_spent)}`)
          .join(" · ");
        return `
          <tr>
            <td><strong>${escapeHtml(s.viewer_email)}</strong></td>
            <td class="mono">${formatDate(s.opened_at)}</td>
            <td class="mono">${escapeHtml(s.ip_address || "—")}</td>
            <td class="mono">${formatDuration(s.total_seconds)}</td>
            <td class="mono" style="max-width:280px">${pages || "—"}</td>
          </tr>`;
      }).join("");

      return `
        <section style="margin-bottom: 44px;">
          <div class="doc-row" style="margin-bottom: 0;">
            <div class="doc-row-head" style="margin-bottom: 14px;">
              <div>
                <h3>${escapeHtml(doc.title)}</h3>
                <div class="doc-meta">
                  ${docSessions.length} open${docSessions.length === 1 ? "" : "s"} ·
                  ${uniqueReaders} reader${uniqueReaders === 1 ? "" : "s"} ·
                  ${formatDuration(totalTime)} total reading time
                </div>
              </div>
              <span class="badge ${docSessions.length ? "badge-mint" : "badge-amber"}">
                ${docSessions.length ? "Viewed" : "Not opened yet"}
              </span>
            </div>

            ${docSessions.length ? `
              <div class="panel-label">Opens</div>
              <div class="table-wrap" style="margin-bottom: 22px;">
                <table>
                  <thead><tr><th>Reader</th><th>Opened</th><th>IP address</th><th>Time spent</th><th>Per page</th></tr></thead>
                  <tbody>${sessionRows}</tbody>
                </table>
              </div>
              ${renderPageBars(pageTotals)}
            ` : `<p style="color:var(--ink-soft); font-size: 0.9rem;">No one has opened this document yet.</p>`}
          </div>
        </section>`;
    }

    function renderPageBars(pageTotals) {
      const pages = Object.keys(pageTotals).map(Number).sort((a, b) => a - b);
      if (!pages.length) return "";
      const max = Math.max(...pages.map((p) => pageTotals[p]), 1);
      const bars = pages.map((p) => `
        <div class="bar-row">
          <span class="bar-label">Page ${p}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2, (pageTotals[p] / max) * 100)}%"></div></div>
          <span class="bar-value">${formatDuration(pageTotals[p])}</span>
        </div>`).join("");
      return `<div class="panel-label">Time per page (all readers)</div>${bars}`;
    }

    $("#signout-btn").addEventListener("click", signOut);
    init();
  </script>
</body>
</html>
